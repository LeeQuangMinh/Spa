<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Liệu Trình</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background: #f0f4f4; color: #333; }
        
        /* Thanh điều khiển nút bấm hiện đại */
        .bill-controls { max-width: 1080px; margin: 0 auto 20px auto; display: flex; gap: 12px; justify-content: center; }
        .btn { padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; color: white; display: flex; align-items: center; gap: 6px; font-size: 15px; transition: all 0.2s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-download { background-color: #2ecc71; }
        .btn-copy { background-color: #3498db; }
        .share-btn { background-color: #4db7b3; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        /* Khung phiếu liệu trình cố định kích thước 1080px để chụp ảnh chuẩn nét */
        #print-area { width: 1080px; margin: 0 auto; background: white; padding: 45px; border-radius: 8px; border: 1px solid #cee5e4; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        
        /* Dòng tiêu đề lớn trên cùng */
        .page-main-title { text-align: center; font-size: 32px; font-weight: bold; color: #4db7b3; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Thiết kế phần Header của Spa */
        .header-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; table-layout: fixed; }
        .header-table td { padding: 0; vertical-align: top; }
        .spa-info { width: 45%; font-size: 16px; line-height: 1.6; color: #555; padding-right: 25px; box-sizing: border-box; }
        .spa-name { font-weight: bold; font-size: 22px; color: #4db7b3; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Khung thông tin khách hàng bên phải có ô kẻ rõ ràng */
        .info-title { background-color: #4db7b3; color: white; font-weight: bold; text-align: center; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; padding: 10px !important; }
        .customer-table { width: 100%; border-collapse: collapse; background: #fafcfc; border: 1px solid #4db7b3; }
        .customer-table td { padding: 10px 15px; font-size: 15px; border: 1px solid #cee5e4; color: #444; }
        .label-cell { font-weight: 600; color: #555; width: 35%; background: #f2f8f7; border-right: 1px solid #cee5e4; }
        .value-cell { font-weight: bold; color: #111; }
        
        /* Tiêu đề phần chi tiết buổi */
        .detail-title { font-weight: bold; font-size: 18px; margin: 35px 0 15px 0; text-transform: uppercase; color: #4db7b3; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
        .detail-title::before { content: ""; display: inline-block; width: 5px; height: 18px; background-color: #4db7b3; border-radius: 2px; }
        
        /* Bảng chi tiết buổi kẻ ô rõ ràng, dễ nhìn */
        .main-table { width: 100%; border-collapse: collapse; border: 1px solid #4db7b3; }
        .main-table th { background-color: #4db7b3; color: white; font-weight: 600; padding: 12px 10px; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid #4db7b3; }
        .main-table td { padding: 12px 15px; font-size: 15px; color: #222; border: 1px solid #cee5e4; text-align: center; }
        .main-table tbody tr:nth-child(even) { background-color: #f8fbfb; } /* Đổ màu xen kẽ nhẹ */
        .text-left { text-align: left !important; padding-left: 15px !important; }
    </style>
</head>
<body>

    <div class="bill-controls">
        <button class="btn btn-download" onclick="downloadBillAsImage(document.getElementById('print-area'))">💾 Tải Ảnh Phiếu</button>
        <button class="btn btn-copy" onclick="copyBillAsImage(document.getElementById('print-area'))">📷 Copy Ảnh</button>
        <button class="btn share-btn" onclick="shareBillAsImage(document.getElementById('print-area'))">📤 Gửi / Chia Sẻ</button>
    </div>

    <div id="print-area" data-sdt="" data-hoivien="">
        
        <div class="page-main-title">Phiếu Liệu Trình</div>

        <table class="header-table">
            <tr>
                <td class="spa-info">
                    <div class="spa-name" id="txtTenSpa"></div>
                    <div id="txtDiaChi"></div>
                    <div style="margin-top: 4px; font-weight: 500;" id="txtSDT"></div>
                </td>
                <td style="width: 55%;">
                    <table class="customer-table">
                        <tr>
                            <td class="info-title" colspan="2">Thông Tin Khách Hàng</td>
                        </tr>
                        <tr>
                            <td class="label-cell">Khách Hàng:</td>
                            <td class="value-cell" id="txtTenKhach"></td>
                        </tr>
                        <tr>
                            <td class="label-cell">Liệu Trình:</td>
                            <td class="value-cell" style="color: #38928f;" id="txtTenLieuTrinh"></td>
                        </tr>
                        <tr>
                            <td class="label-cell">Số Buổi:</td>
                            <td class="value-cell" id="txtSoBuoi"></td>
                        </tr>
                        <tr>
                            <td class="label-cell">Đã Làm:</td>
                            <td class="value-cell" style="color: #2ecc71;" id="txtDaLam"></td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>

        <div class="detail-title">Nhật Ký Liệu Trình</div>
        <table class="main-table">
            <thead>
                <tr>
                    <th style="width: 8%;">STT</th>
                    <th style="width: 17%;">Buổi</th>
                    <th style="width: 25%;">Ngày làm</th>
                    <th style="width: 50%;">Ghi chú chi tiết</th>
                </tr>
            </thead>
            <tbody id="tblChiTiet">
                <tr>
                    <td colspan="4" style="color: #999; font-style: italic; padding: 30px; background: #fafafa;">Chưa ghi nhận thực hiện buổi nào</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function loadDataFromHash() {
            try {
                const hash = window.location.hash.substring(1);
                if (!hash) return;
                
                let jsonString = decodeURIComponent(hash).trim();
                
                // Thuật toán dọn chuỗi mảng ChiTiet sạch sẽ
                const chiTietStart = jsonString.indexOf('"ChiTiet": [');
                if (chiTietStart !== -1) {
                    const prefix = jsonString.substring(0, chiTietStart);
                    let arrayPart = jsonString.substring(chiTietStart);
                    
                    const lastBracketIndex = arrayPart.lastIndexOf(']');
                    if (lastBracketIndex !== -1) {
                        let contentInside = arrayPart.substring(12, lastBracketIndex).trim();
                        
                        if (contentInside.endsWith(',')) {
                            contentInside = contentInside.substring(0, contentInside.length - 1).trim();
                        } else if (contentInside.replace(/\s/g, '').endsWith(',}')) {
                            contentInside = contentInside.replace(/,\s*$/, '').trim();
                        }
                        
                        contentInside = contentInside.replace(/,\s*,/g, ','); 
                        const suffix = arrayPart.substring(lastBracketIndex);
                        jsonString = prefix + '"ChiTiet": [' + contentInside + suffix;
                    }
                }
                
                const data = JSON.parse(jsonString);
                
                // Đổ dữ liệu text
                document.getElementById('txtTenSpa').innerText = data.TenSpa || '';
                document.getElementById('txtDiaChi').innerText = data.DiaChi || '';
                document.getElementById('txtSDT').innerText = data.SDT ? 'SĐT: ' + data.SDT : '';
                document.getElementById('txtTenKhach').innerText = data.TenKhach || '';
                document.getElementById('txtTenLieuTrinh').innerText = data.TenLieuTrinh || '';
                document.getElementById('txtSoBuoi').innerText = data.SoBuoi !== undefined ? data.SoBuoi + ' buổi' : '';
                document.getElementById('txtDaLam').innerText = data.DaLam !== undefined ? data.DaLam + ' buổi' : '';
                
                // Gán thuộc tính dataset phục vụ việc đặt tên file ảnh
                const element = document.getElementById('print-area');
                element.dataset.sdt = data.SDT || '';
                element.dataset.hoivien = data.TenKhach || 'Khach_Hang';

                const tbody = document.getElementById('tblChiTiet');
                tbody.innerHTML = '';
                
                if(data.ChiTiet && data.ChiTiet.length > 0) {
                    data.ChiTiet.forEach((item, index) => {
                        if (item && item.Ngay) {
                            const row = `<tr>
                                <td style="font-weight: 600; color: #666;">${index + 1}</td>
                                <td style="font-weight: 500;">Buổi ${index + 1}</td>
                                <td style="color: #444;">${formatDate(item.Ngay)}</td>
                                <td class="text-left">${item.GhiChu || '-'}</td>
                            </tr>`;
                            tbody.insertAdjacentHTML('beforeend', row);
                        }
                    });
                }
                
                if (tbody.children.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="color: #999; padding: 30px; background: #fafafa; font-style: italic;">Chưa ghi nhận thực hiện buổi nào</td></tr>`;
                }
            } catch (error) {
                console.error("Lỗi biên dịch dữ liệu JSON:", error);
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            return dateStr; 
        }

        // --- Giữ nguyên cấu trúc 3 hàm chụp ảnh nét cao scale: 2 phối hợp với khung 1080px ---
        function copyBillAsImage(element) { 
            const c = document.querySelector('.bill-controls'); 
            c.style.display = 'none'; 
            html2canvas(element, { scale: 2, useCORS: true }).then(canvas => { 
                canvas.toBlob(blob => { 
                    try { 
                        window.focus(); 
                        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(() => alert('Đã copy ảnh phiếu vào bộ nhớ tạm!')).catch(err => { 
                            console.error(err); 
                            alert('Lỗi khi copy: ' + err); 
                        }); 
                    } catch (e) { 
                        alert("Trình duyệt không hỗ trợ"); 
                    } 
                }); 
                c.style.display = 'flex'; 
            }).catch(err => { 
                console.error('Lỗi html2canvas:', err); 
                c.style.display = 'flex'; 
            }); 
        }

        function downloadBillAsImage(element) { 
            const sdt = element.dataset.sdt; 
            const hoivien = element.dataset.hoivien; 
            const filename = (sdt ? sdt : `Phieu_LT_${hoivien.replace(/\s+/g, '_')}`) + '.png'; 
            const c = document.querySelector('.bill-controls'); 
            c.style.display = 'none'; 
            html2canvas(element, { scale: 2, useCORS: true }).then(canvas => { 
                const link = document.createElement('a'); 
                link.download = filename; 
                link.href = canvas.toDataURL("image/png"); 
                link.click(); 
                c.style.display = 'flex'; 
            }).catch(err => { 
                console.error(err); 
                alert('Lỗi tạo ảnh.'); 
                c.style.display = 'flex'; 
            }); 
        }
        
        async function shareBillAsImage(element) { 
            const sdt = element.dataset.sdt; 
            const hoivien = element.dataset.hoivien; 
            const filename = (sdt ? sdt : `Phieu_LT_${hoivien}`) + '.png'; 
            const shareBtn = document.querySelector('.share-btn'); 
            const originalText = shareBtn.textContent; 
            shareBtn.textContent = "⏳ Đang xử lý..."; 
            shareBtn.disabled = true; 
            const c = document.querySelector('.bill-controls'); 
            c.style.display = 'none'; 
            try { 
                const canvas = await html2canvas(element, { scale: 2, useCORS: true, logging: false }); 
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png')); 
                const file = new File([blob], filename, { type: 'image/png' }); 
                if (navigator.canShare && navigator.canShare({ files: [file] })) { 
                    await navigator.share({ files: [file] }); 
                } else { 
                    alert('Hệ thống sẽ tự động TẢI PHIẾU về máy, bạn mở ứng dụng chọn ảnh từ thư viện để gửi nhé!');
                    const link = document.createElement('a');
                    link.download = filename;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                } 
            } catch (error) { 
                if(!error.message.includes('No Share API') && error.name !== 'AbortError') {
                    alert("Điện thoại xử lý quá lâu. Bạn vui lòng dùng nút TẢI PHIẾU nhé.");
                }
            } finally { 
                c.style.display = 'flex'; 
                shareBtn.textContent = originalText; 
                shareBtn.disabled = false; 
            } 
        }

        window.onload = loadDataFromHash;
    </script>
</body>
</html>

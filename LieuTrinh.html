<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Liệu Trình</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; color: #333; }
        
        /* Thanh điều khiển nút bấm */
        .bill-controls { max-width: 650px; margin: 0 auto 15px auto; display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .btn-download { background-color: #2ecc71; }
        .btn-copy { background-color: #3498db; }
        .share-btn { background-color: #e67e22; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        /* Khung phiếu liệu trình để chụp ảnh */
        #print-area { max-width: 650px; margin: 0 auto; background: white; padding: 30px; border: 1px solid #000; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        
        /* Thiết kế Table gốc */
        .header-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .header-table td { padding: 6px; vertical-align: top; font-size: 14px; }
        .spa-info { width: 40%; font-size: 14px; line-height: 1.5; }
        .spa-name { font-weight: bold; font-size: 16px; color: #000; }
        .info-title { background-color: #f2f2f2; font-weight: bold; text-align: center; border: 1px solid #000; }
        .border-cell { border: 1px solid #000; padding: 6px 10px; }
        
        .detail-title { font-weight: bold; font-size: 15px; margin: 10px 0 5px 0; text-transform: uppercase; }
        .main-table { width: 100%; border-collapse: collapse; }
        .main-table th, .main-table td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 14px; }
        .main-table th { background-color: #f2f2f2; }
        .text-left { text-align: left !important; }
    </style>
</head>
<body>

    <div class="bill-controls">
        <button class="btn btn-download" onclick="downloadBillAsImage(document.getElementById('print-area'))">💾 Tải Ảnh Phiếu</button>
        <button class="btn btn-copy" onclick="copyBillAsImage(document.getElementById('print-area'))">📷 Copy Ảnh</button>
        <button class="btn share-btn" onclick="shareBillAsImage(document.getElementById('print-area'))">📤 Gửi / Chia Sẻ</button>
    </div>

    <div id="print-area" data-sdt="" data-hoivien="">
        <table class="header-table">
            <tr>
                <td class="spa-info">
                    <div class="spa-name" id="txtTenSpa"></div>
                    <div id="txtDiaChi"></div>
                    <div id="txtSDT"></div>
                </td>
                <td>
                    <table style="width: 100%; border-collapse: collapse;">
                        <tr>
                            <td class="info-title" colspan="2">Thông Tin</td>
                        </tr>
                        <tr>
                            <td class="border-cell" style="width: 30%; font-weight: bold;">Thông Tin</td>
                            <td class="border-cell" id="txtTenKhach"></td>
                        </tr>
                        <tr>
                            <td class="border-cell" style="font-weight: bold;">Liệu Trình:</td>
                            <td class="border-cell" id="txtTenLieuTrinh"></td>
                        </tr>
                        <tr>
                            <td class="border-cell" style="font-weight: bold;">Số Buổi:</td>
                            <td class="border-cell" id="txtSoBuoi"></td>
                        </tr>
                        <tr>
                            <td class="border-cell" style="font-weight: bold;">Đã Làm:</td>
                            <td class="border-cell" id="txtDaLam"></td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>

        <div class="detail-title">Chi Tiết</div>
        <table class="main-table">
            <thead>
                <tr>
                    <th style="width: 10%;">STT</th>
                    <th style="width: 25%;">Buổi</th>
                    <th style="width: 25%;">Ngày</th>
                    <th style="width: 40%;">ghi chú</th>
                </tr>
            </thead>
            <tbody id="tblChiTiet">
                <tr>
                    <td colspan="4" style="color: #999; font-style: italic; padding: 20px;">Chưa thực hiện buổi nào</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // 1. Hàm giải mã và sửa triệt để lỗi mảng chuỗi trống/dư dấu phẩy từ AppSheet
        function loadDataFromHash() {
            try {
                const hash = window.location.hash.substring(1);
                if (!hash) return;
                
                let jsonString = decodeURIComponent(hash).trim();
                
                // Thuật toán dọn dẹp dấu phẩy thừa thông minh:
                // Tìm kiếm vị trí dấu phẩy cuối cùng nằm trước dấu đóng mảng "]" của ChiTiet để xử lý triệt để
                const chiTietIndex = jsonString.lastIndexOf('"ChiTiet": [');
                if (chiTietIndex !== -1) {
                    let partBefore = jsonString.substring(0, chiTietIndex);
                    let partArray = jsonString.substring(chiTietIndex);
                    
                    // Xóa dấu phẩy thừa đứng ngay trước dấu ] của mảng ChiTiet
                    partArray = partArray.replace(/,\s*\]/g, ']');
                    jsonString = partBefore + partArray;
                }
                
                const data = JSON.parse(jsonString);
                
                // Đổ dữ liệu, nếu trống thì giữ nguyên rỗng ""
                document.getElementById('txtTenSpa').innerText = data.TenSpa || '';
                document.getElementById('txtDiaChi').innerText = data.DiaChi || '';
                document.getElementById('txtSDT').innerText = data.SDT || '';
                document.getElementById('txtTenKhach').innerText = data.TenKhach || '';
                document.getElementById('txtTenLieuTrinh').innerText = data.TenLieuTrinh || '';
                document.getElementById('txtSoBuoi').innerText = data.SoBuoi !== undefined ? data.SoBuoi : '';
                document.getElementById('txtDaLam').innerText = data.DaLam !== undefined ? data.DaLam : '';
                
                // Gán thuộc tính dataset phục vụ việc đặt tên file ảnh
                const element = document.getElementById('print-area');
                element.dataset.sdt = data.SDT || '';
                element.dataset.hoivien = data.TenKhach || 'Khach_Hang';

                const tbody = document.getElementById('tblChiTiet');
                tbody.innerHTML = '';
                
                if(data.ChiTiet && data.ChiTiet.length > 0) {
                    data.ChiTiet.forEach((item, index) => {
                        // Kiểm tra nếu item hợp lệ và có thuộc tính Ngay
                        if (item && item.Ngay) {
                            const row = `<tr>
                                <td>${index + 1}</td>
                                <td>Buổi ${index + 1}</td>
                                <td>${formatDate(item.Ngay)}</td>
                                <td class="text-left">${item.GhiChu || ''}</td>
                            </tr>`;
                            tbody.insertAdjacentHTML('beforeend', row);
                        }
                    });
                }
                
                // Nếu sau khi quét mà bảng vẫn không có dòng nào hợp lệ thì hiển thị thông báo trống
                if (tbody.children.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="color: #999; padding: 15px;">Chưa thực hiện buổi nào</td></tr>`;
                }
            } catch (error) {
                console.error("Lỗi parse dữ liệu JSON:", error);
            }
        }

        function formatDate(dateStr) {
            if(!dateStr) return '';
            const d = new Date(dateStr);
            if(isNaN(d.getTime())) return dateStr;
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        // --- Giữ nguyên gốc 3 hàm chụp ảnh từ App Hụi phối hợp với #print-area ---
        function copyBillAsImage(element) { 
            const c = document.querySelector('.bill-controls'); 
            c.style.display = 'none'; 
            html2canvas(element, { scale: 1.5, useCORS: true }).then(canvas => { 
                canvas.toBlob(blob => { 
                    try { 
                        window.focus(); 
                        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(() => alert('Đã copy ảnh bill vào bộ nhớ tạm!')).catch(err => { 
                            console.error(err); 
                            alert('Lỗi khi copy: ' + err); 
                        }); 
                    } catch (e) { 
                        alert("Trình duyệt không hỗ trợ"); 
                    } 
                }); 
                c.style.display = 'flex'; 
            }).catch(err => { 
                console.error('Lỗi html2canvas:', err); 
                c.style.display = 'flex'; 
            }); 
        }

        function downloadBillAsImage(element) { 
            const sdt = element.dataset.sdt; 
            const hoivien = element.dataset.hoivien; 
            const filename = (sdt ? sdt : `Phieu_LT_${hoivien.replace(/\s+/g, '_')}`) + '.png'; 
            const c = document.querySelector('.bill-controls'); 
            c.style.display = 'none'; 
            html2canvas(element, { scale: 1.5, useCORS: true }).then(canvas => { 
                const link = document.createElement('a'); 
                link.download = filename; 
                link.href = canvas.toDataURL("image/png"); 
                link.click(); 
                c.style.display = 'flex'; 
            }).catch(err => { 
                console.error(err); 
                alert('Lỗi tạo ảnh.'); 
                c.style.display = 'flex'; 
            }); 
        }
        
        async function shareBillAsImage(element) { 
            const sdt = element.dataset.sdt; 
            const hoivien = element.dataset.hoivien; 
            const filename = (sdt ? sdt : `Phieu_LT_${hoivien}`) + '.png'; 
            const shareBtn = document.querySelector('.share-btn'); 
            const originalText = shareBtn.textContent; 
            shareBtn.textContent = "⏳ Đang xử lý..."; 
            shareBtn.disabled = true; 
            const c = document.querySelector('.bill-controls'); 
            c.style.display = 'none'; 
            try { 
                const canvas = await html2canvas(element, { scale: 1.5, useCORS: true, logging: false }); 
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png')); 
                const file = new File([blob], filename, { type: 'image/png' }); 
                if (navigator.canShare && navigator.canShare({ files: [file] })) { 
                    await navigator.share({ files: [file] }); 
                } else { 
                    alert('Hệ thống sẽ tự động TẢI PHIẾU về máy, bạn mở ứng dụng chọn ảnh từ thư viện để gửi nhé!');
                    const link = document.createElement('a');
                    link.download = filename;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                } 
            } catch (error) { 
                if(!error.message.includes('No Share API') && error.name !== 'AbortError') {
                    alert("Điện thoại xử lý quá lâu. Bạn vui lòng dùng nút TẢI PHIẾU nhé.");
                }
            } finally { 
                c.style.display = 'flex'; 
                shareBtn.textContent = originalText; 
                shareBtn.disabled = false; 
            } 
        }

        window.onload = loadDataFromHash;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa Đơn Thanh Toán</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background: #f0f4f4; color: #333; }
        
        .bill-controls { max-width: 1080px; margin: 0 auto 20px auto; display: flex; gap: 12px; justify-content: center; }
        .btn { padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; color: white; display: flex; align-items: center; gap: 6px; font-size: 15px; transition: all 0.2s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-download { background-color: #2ecc71; }
        .btn-copy { background-color: #3498db; }
        .share-btn { background-color: #4db7b3; }
        .btn-print { background-color: #7f8c8d; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        
        /* Khung hóa đơn chuẩn 1080px */
        #print-area { width: 1080px; margin: 0 auto; background: white; padding: 50px; border-radius: 8px; border: 1px solid #cee5e4; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* Header thông tin Spa */
        .spa-header { text-align: center; margin-bottom: 30px; line-height: 1.6; }
        .spa-name { font-weight: bold; font-size: 26px; color: #4db7b3; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .spa-meta { font-size: 16px; color: #555; }
        
        /* Tiêu đề hóa đơn */
        .bill-title { text-align: center; font-size: 30px; font-weight: bold; color: #333; margin: 25px 0 5px 0; text-transform: uppercase; letter-spacing: 2px; }
        .bill-code { text-align: center; font-size: 16px; font-style: italic; color: #666; margin-bottom: 35px; }
        
        /* Khung thông tin khách hàng */
        .info-section { width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 16px; }
        .info-section td { padding: 6px 0; vertical-align: top; }
        .info-label { width: 15%; color: #666; font-weight: 500; }
        .info-value { font-weight: 600; color: #111; }
        
        /* Bảng chi tiết dịch vụ/sản phẩm mua */
        .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .invoice-table th { background-color: #4db7b3; color: white; font-weight: 600; padding: 12px 10px; font-size: 16px; text-transform: uppercase; border: 1px solid #4db7b3; }
        .invoice-table td { padding: 14px 12px; font-size: 16px; color: #222; border-bottom: 1px solid #cee5e4; text-align: center; }
        .invoice-table tbody tr:nth-child(even) { background-color: #f8fbfb; }
        .text-left { text-align: left !important; padding-left: 10px !important; }
        .text-right { text-align: right !important; padding-right: 10px !important; }
        
        /* Phần chứa Summary (phải) và QR (trái) xếp ngang trên app */
        .bill-footer-container { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; margin-top: 20px; }
        
        /* Khung chứa mã QR bự và thông tin Bank xếp dọc gọn gàng */
        .qr-bank-container { width: 45%; display: flex; flex-direction: column; align-items: center; border: 1px dashed #4db7b3; padding: 20px; border-radius: 8px; background: #fafcfc; box-sizing: border-box; text-align: center; }
        #qrcode { width: 280px; height: 280px; background-color: #fff; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; padding: 10px; border: 1px solid #eee; border-radius: 4px; box-sizing: border-box; }
        #qrcode img { width: 100%; height: 100%; }
        .bank-details { font-size: 16px; line-height: 1.6; color: #444; width: 100%; }
        .qr-title { font-weight: bold; color: #4db7b3; text-transform: uppercase; margin-bottom: 8px; font-size: 15px; letter-spacing: 0.5px; }
        
        /* Khu vực tính tiền tổng tổng cộng nằm bên phải */
        .summary-container { width: 50%; border-collapse: collapse; font-size: 16px; box-sizing: border-box; }
        .summary-container td { padding: 10px 0; }
        .summary-label { text-align: left; color: #555; }
        .summary-value { text-align: right; font-weight: 600; padding-right: 5px; }
        .total-row { font-size: 21px; font-weight: bold; color: #4db7b3; border-top: 1px dashed #4db7b3; }
        
        /* Chân trang cảm ơn */
        .footer-thanks { text-align: center; font-size: 16px; font-style: italic; color: #555; margin-top: 40px; border-top: 1px dashed #cee5e4; padding-top: 20px; width: 100%; order: 3; }

        /* CẤU HÌNH IN BILL K58 / K80 BLUETOOTH */
        @media print {
            body { background: white; margin: 0; padding: 0; color: #000; font-size: 11px; }
            .bill-controls { display: none !important; }
            #print-area { width: 100% !important; max-width: 100% !important; padding: 10px; border: none !important; box-shadow: none !important; display: block !important; }
            .spa-name { font-size: 16px; }
            .spa-meta { font-size: 11px; }
            .bill-title { font-size: 18px; margin: 15px 0 2px 0; }
            .bill-code { font-size: 11px; margin-bottom: 15px; }
            .info-section { font-size: 11px; margin-bottom: 15px; }
            .info-label { width: 25%; }
            .invoice-table th { font-size: 11px; padding: 6px 4px; background-color: transparent !important; color: #000 !important; border: 1px solid #000; }
            .invoice-table td { font-size: 11px; padding: 6px 4px; border-bottom: 1px dashed #000; color: #000; }
            
            .bill-footer-container { display: flex !important; flex-direction: column !important; width: 100% !important; margin-top: 10px; }
            .summary-container { width: 100% !important; order: 1 !important; font-size: 11px; margin-bottom: 15px; }
            .total-row { font-size: 13px; color: #000 !important; border-top: 1px dashed #000; }
            
            .qr-bank-container { width: 100% !important; order: 2 !important; border: none; padding: 15px 0; background: transparent; display: flex !important; flex-direction: column !important; align-items: center; border-top: 1px dashed #000; }
            #qrcode { width: 140px !important; height: 140px !important; padding: 5px; margin-bottom: 8px; }
            .bank-details { font-size: 11px; line-height: 1.5; text-align: center; }
            .footer-thanks { font-size: 11px; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #000; order: 3 !important; display: block; }
        }
    </style>
</head>
<body>

    <div class="bill-controls">
        <button class="btn btn-download" onclick="downloadBill(document.getElementById('print-area'))">💾 Tải Ảnh Bill</button>
        <button class="btn btn-copy" onclick="copyBill(document.getElementById('print-area'))">📷 Copy Ảnh</button>
        <button class="btn share-btn" onclick="shareBill(document.getElementById('print-area'))">📤 Gửi Khách</button>
        <button class="btn btn-print" onclick="window.print()">🖨️ In Máy Bluetooth</button>
    </div>

    <div id="print-area" data-mahd="" data-khach="">
        <div class="spa-header">
            <div class="spa-name" id="txtTenSpa"></div>
            <div class="spa-meta" id="txtDiaChi"></div>
            <div class="spa-meta" style="font-weight: 500;" id="txtSDT"></div>
        </div>

        <div class="bill-title">Hóa Đơn Thanh Toán</div>
        <div class="bill-code" id="txtMaHD"></div>

        <table class="info-section">
            <tr>
                <td class="info-label">Khách hàng:</td>
                <td class="info-value" id="txtTenKhach"></td>
            </tr>
            <tr>
                <td class="info-label">Ngày tạo:</td>
                <td class="info-value" id="txtNgayHD"></td>
            </tr>
        </table>

        <table class="invoice-table">
            <thead>
                <tr>
                    <th style="width: 42%; text-align: left; padding-left: 10px;">Dịch vụ / Sản phẩm</th>
                    <th style="width: 10%;">SL</th>
                    <th style="width: 16%; text-align: right;">Đơn giá</th>
                    <th style="width: 16%; text-align: right;">Giảm giá</th>
                    <th style="width: 16%; text-align: right; padding-right: 10px;">Thành tiền</th>
                </tr>
            </thead>
            <tbody id="tblChiTiet"></tbody>
        </table>

        <div class="bill-footer-container">
            <div class="qr-bank-container">
                <div id="qrcode"></div>
                <div class="bank-details">
                    <div class="qr-title">Chuyển khoản qua QR</div>
                    <div>Ngân hàng: <strong id="lblTenNganHang"></strong></div>
                    <div>Số TK: <strong id="lblSTK"></strong></div>
                    <div>Chủ TK: <strong id="lblChuTK"></strong></div>
                </div>
            </div>
            
            <table class="summary-container">
                <tr>
                    <td class="summary-label">Tổng tiền dịch vụ:</td>
                    <td class="summary-value" id="txtTongTien">0</td>
                </tr>
                <tr class="total-row">
                    <td class="summary-label" style="font-weight: bold; padding-top: 8px;">Khách Thanh Toán:</td>
                    <td class="summary-value" style="font-weight: bold; padding-top: 8px;" id="txtThanhToan">0</td>
                </tr>
            </table>
        </div>

        <div class="footer-thanks">
            Quý khách vui lòng kiểm tra lại hóa đơn.<br>
            Trần Dung Beauty xin cảm ơn và hẹn gặp lại Quý khách!
        </div>
    </div>

    <script>
        // SỬ DỤNG LẠI CHUẨN ĐỒNG BỘ 100% ENGINE VIETQR GỐC ĐANG CHẠY ỔN ĐỊNH CỦA BẠN
        const VietQRUtil = {
            clean: (s) => s ? s.toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D').replace(/[^a-zA-Z0-9 ]/g, '').trim().toUpperCase() : "",
            crc16: (data) => {
                let crc = 0xFFFF;
                for (let i = 0; i < data.length; i++) {
                    crc ^= data.charCodeAt(i) << 8;
                    for (let j = 0; j < 8; j++) {
                        crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
                    }
                }
                return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
            },
            generate: (bin, stk, msg, amount, name) => {
                const f = (id, v) => id + String(v).length.toString().padStart(2, '0') + v;
                // Khung truyền Merchant Account Napas định danh tài khoản ngân hàng liên kết
                const m = f("00", "A000000727") + f("01", f("00", bin) + f("01", stk)) + f("02", "QRIBFTTA");
                let s = f("00", "01") + f("01", "12") + f("38", m) + f("53", "704");
                
                // Đồng bộ hóa trường số tiền thanh toán chuẩn quốc tế vào mã QR
                if (amount && amount !== '0') {
                    s += f("54", amount);
                }
                
                s += f("58", "VN") + f("59", VietQRUtil.clean(name)) + f("60", "HANOI");
                if (msg) s += f("62", f("08", VietQRUtil.clean(msg)));
                return s + "6304" + VietQRUtil.crc16(s + "6304");
            }
        };

        function loadInvoiceData() {
            try {
                const hash = window.location.hash.substring(1);
                if (!hash) return;
                let jsonString = decodeURIComponent(hash).trim();
                
                // Thuật toán dọn rác chuỗi tránh lỗi crash hàm JSON.parse()
                const chiTietStart = jsonString.indexOf('"ChiTiet": [');
                if (chiTietStart !== -1) {
                    const prefix = jsonString.substring(0, chiTietStart);
                    let arrayPart = jsonString.substring(chiTietStart);
                    const lastBracketIndex = arrayPart.lastIndexOf(']');
                    if (lastBracketIndex !== -1) {
                        let contentInside = arrayPart.substring(12, lastBracketIndex).trim();
                        if (contentInside.endsWith(',')) contentInside = contentInside.substring(0, contentInside.length - 1).trim();
                        contentInside = contentInside.replace(/,\s*,/g, ','); 
                        jsonString = prefix + '"ChiTiet": [' + contentInside + arrayPart.substring(lastBracketIndex);
                    }
                }
                
                const data = JSON.parse(jsonString);
                
                // Đổ text thông tin cơ bản
                document.getElementById('txtTenSpa').innerText = data.TenSpa || '';
                document.getElementById('txtDiaChi').innerText = data.DiaChi || '';
                document.getElementById('txtSDT').innerText = data.SDT ? 'Hotline: ' + data.SDT : '';
                document.getElementById('txtMaHD').innerText = data.MaHD ? 'Số HD: ' + data.MaHD : '';
                document.getElementById('txtNgayHD').innerText = data.NgayHD || '';
                document.getElementById('txtTenKhach').innerText = data.TenKhach || 'Khách vãng lai';
                
                document.getElementById('txtTongTien').innerText = data.TongTien ? formatNumber(data.TongTien) : '0';
                document.getElementById('txtThanhToan').innerText = data.ThanhToan ? formatNumber(data.ThanhToan) : '0';
                
                const element = document.getElementById('print-area');
                element.dataset.mahd = data.MaHD || 'HD';
                element.dataset.khach = data.TenKhach || 'Khach';

                // Nhận tham số động tài khoản ngân hàng từ AppSheet truyền qua
                const rawAmount = data.TongThu ? data.TongThu.toString().replace(/[^0-9]/g, '') : '0';
                const cfg = {
                    bin: data.BankBIN || "970418", // Mặc định nếu trống là mã BIN BIDV
                    bankName: data.BankName || "BIDV",
                    stk: (data.STK || "14110000427253").toString().replace(/\D/g, ''),
                    name: VietQRUtil.clean(data.ChuTK || "TRAN THI KIM DUNG"),
                    msg: "THANH TOAN HOA DON " + (data.MaHD || '')
                };

                document.getElementById('lblTenNganHang').innerText = cfg.bankName;
                document.getElementById('lblSTK').innerText = cfg.stk;
                document.getElementById('lblChuTK').innerText = cfg.name;

                // Tạo chuỗi mã hóa VietQR
                const qrPayload = VietQRUtil.generate(cfg.bin, cfg.stk, cfg.msg, rawAmount, cfg.name);

                // DÙNG ĐÚNG ENGINE THƯ VIỆN CHUẨN GỐC ĐỂ VẼ QR (QUÉT PHÁT ĂN NGAY)
                document.getElementById('qrcode').innerHTML = "";
                const targetSize = window.matchMedia("print").matches ? 160 : 280;
                
                new QRCode(document.getElementById("qrcode"), {
                    text: qrPayload,
                    width: targetSize,
                    height: targetSize,
                    correctLevel: QRCode.CorrectLevel.M
                });

                // Đổ danh sách bảng dịch vụ
                const tbody = document.getElementById('tblChiTiet');
                tbody.innerHTML = '';
                if(data.ChiTiet && data.ChiTiet.length > 0) {
                    data.ChiTiet.forEach((item) => {
                        if (item && item.TenDV) {
                            let displayDiscount = '-';
                            if (item.GiamGiaDV && item.GiamGiaDV !== '0') {
                                displayDiscount = item.GiamGiaDV.toString().includes('%') ? item.GiamGiaDV : formatNumber(item.GiamGiaDV);
                            }
                            const row = `<tr>
                                <td class="text-left" style="font-weight: 500;">${item.TenDV}</td>
                                <td>${item.SoLuong || 1}</td>
                                <td class="text-right">${item.DonGia ? formatNumber(item.DonGia) : '0'}</td>
                                <td class="text-right" style="color: #e74c3c; font-weight: 500;">${displayDiscount}</td>
                                <td class="text-right" style="font-weight: 600;">${item.ThanhTien ? formatNumber(item.ThanhTien) : '0'}</td>
                            </tr>`;
                            tbody.insertAdjacentHTML('beforeend', row);
                        }
                    });
                }
                if (tbody.children.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="color: #999; padding: 20px; font-style: italic;">Không có thông tin dịch vụ</td></tr>`;
                }
            } catch (error) {
                console.error("Lỗi hệ thống:", error);
            }
        }

        function formatNumber(num) {
            if (!num) return '0';
            let cleanNum = num.toString().replace(/[^0-9]/g, '');
            return cleanNum ? Number(cleanNum).toLocaleString('en-US') : '0';
        }

        // --- Hệ thống hàm chụp xuất ảnh ---
        function copyBill(element) { 
            const c = document.querySelector('.bill-controls'); c.style.display = 'none'; 
            html2canvas(element, { scale: 2, useCORS: true }).then(canvas => { 
                canvas.toBlob(blob => { navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(() => alert('Đã copy ảnh bill!')); }); 
                c.style.display = 'flex'; 
            }); 
        }
        function downloadBill(element) { 
            const c = document.querySelector('.bill-controls'); c.style.display = 'none'; 
            html2canvas(element, { scale: 2, useCORS: true }).then(canvas => { 
                const link = document.createElement('a'); link.download = `HD_${element.dataset.mahd}.png`; link.href = canvas.toDataURL("image/png"); link.click(); 
                c.style.display = 'flex'; 
            }); 
        }
        async function shareBill(element) { 
            const shareBtn = document.querySelector('.share-btn'); const originalText = shareBtn.textContent; shareBtn.textContent = "⏳..."; shareBtn.disabled = true;
            const c = document.querySelector('.bill-controls'); c.style.display = 'none'; 
            try { 
                const canvas = await html2canvas(element, { scale: 2, useCORS: true }); 
                const blob = await new Promise(r => canvas.toBlob(r, 'image/png')); 
                const file = new File([blob], 'HD.png', { type: 'image/png' }); 
                if (navigator.canShare && navigator.canShare({ files: [file] })) await navigator.share({ files: [file] }); 
                else { const link = document.createElement('a'); link.download = 'HD.png'; link.href = URL.createObjectURL(blob); link.click(); }
            } catch (e) {} finally { c.style.display = 'flex'; shareBtn.textContent = originalText; shareBtn.disabled = false; } 
        }

        window.onload = loadInvoiceData;
    </script>
</body>
</html>
